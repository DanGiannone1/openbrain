[mcp_servers.openbrain-local]
command = "uv"
args = ["run", "python", "-m", "openbrain"]
cwd = "C:\\projects\\openbrain"
startup_timeout_sec = 20

[mcp_servers.azure-mcp-server]
command = "npx"
args = ["-y", "@azure/mcp@latest", "server", "start"]
startup_timeout_sec = 20

[mcp_servers.microsoft-learn]
url = "https://learn.microsoft.com/api/mcp"
